server:
  port: ${MC_PORT:8080}

spring:
  application:
    name: mission-control-server
  datasource:
    url: jdbc:sqlite:${MC_DB_PATH:./data/mission-control.db}
    driver-class-name: org.sqlite.JDBC
    hikari:
      # SQLite is a single-writer file database — one connection avoids lock contention
      maximum-pool-size: 1
  sql:
    init:
      mode: always

mc:
  data-mode: ${MC_DATA_MODE:live}
  api-base-url: ${MC_API_BASE_URL:}
  docker-socket: ${MC_DOCKER_SOCKET:unix:///var/run/docker.sock}
  hermes-image: ${MC_HERMES_IMAGE:nousresearch/hermes-agent}
  container-filter: ${MC_CONTAINER_FILTER:hermes}
  version: 0.1.0
  # curated model catalog fallbacks, used when no live provider fetch is possible
  models:
    anthropic: ${MC_MODELS_ANTHROPIC:claude-fable-5,claude-opus-4-8,claude-sonnet-4-6,claude-haiku-4-5-20251001}
    openai: ${MC_MODELS_OPENAI:gpt-5.2,gpt-5.2-mini,gpt-5.1,gpt-4.1}

logging:
  level:
    com.github.dockerjava: WARN
