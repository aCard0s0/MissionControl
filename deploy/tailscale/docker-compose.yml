# Mission Control behind tailscale — reachable only from the tailnet.
#
# The mission-control container shares the tailscale container's network
# namespace (network_mode: service:tailscale), so NO host ports are published:
# the dashboard is invisible to the LAN and the internet. Tailscale serve
# forwards tailnet TCP :80 to the app on 127.0.0.1:8080.
#
# Usage (via the repo-root manager script — this flavor is the default):
#   cp .env.example .env       # fill in TS_AUTHKEY
#   ./mc start --build         # build hermes-mission-control:latest + compose up -d
#   ./mc status                # tailscale health + the exact URL
#   open http://mission-control.<tailnet>.ts.net

services:
  tailscale:
    image: tailscale/tailscale:latest
    hostname: mission-control            # becomes the MagicDNS name
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY:?set in .env}
      TS_STATE_DIR: /var/lib/tailscale
      TS_SERVE_CONFIG: /config/serve.json
      TS_USERSPACE: "false"              # kernel networking via /dev/net/tun
    volumes:
      - tailscale-state:/var/lib/tailscale
      - ./serve.json:/config/serve.json:ro
    devices:
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "tailscale", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  mission-control:
    image: hermes-mission-control:latest
    network_mode: "service:tailscale"    # shares the tailscale netns — no published ports
    depends_on:
      tailscale:
        condition: service_healthy
    environment:
      MC_DATA_MODE: live
      MC_CONTAINER_FILTER: hermes
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - mission-control-data:/data
    restart: unless-stopped

volumes:
  tailscale-state:
  mission-control-data:
